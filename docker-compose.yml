version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./switches.db}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SSH_USERNAME=${SSH_USERNAME:-admin}
      - SSH_PASSWORD=${SSH_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - hermes-data:/app/data
      - ./backend:/app
    restart: unless-stopped
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermes-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hermes-network

  # PostgreSQL (optional — uncomment for production)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: hermes-postgres
  #   environment:
  #     POSTGRES_USER: hermes
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #     POSTGRES_DB: hermes
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - hermes-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U hermes"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  hermes-data:
  # postgres-data:

networks:
  hermes-network:
    driver: bridge
